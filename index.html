<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0d1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CodeX">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="CodeX Editor">
  <meta name="msapplication-TileColor" content="#0d1117">
  <meta name="msapplication-TileImage" content="icons/icon-144.png">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png">
  <link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/icon-512.png">
  <link rel="icon" type="image/png" sizes="96x96" href="icons/icon-96.png">
  <title>CodeX Editor</title>
  <link rel="stylesheet" href="style.css">
  <!-- Offline splash: shown instantly while app loads -->
  <style>
    #app-loading-splash {
      position:fixed;inset:0;background:#0d1117;z-index:99999;
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
      transition:opacity .3s ease;
    }
    #app-loading-splash.fade-out { opacity:0;pointer-events:none; }
    .splash-logo { width:72px;height:72px;background:#6e40c9;border-radius:16px;display:flex;align-items:center;justify-content:center; }
    .splash-logo svg { width:40px;height:40px;color:#fff; }
    .splash-title { font-family:system-ui,sans-serif;font-size:24px;font-weight:800;color:#fff;letter-spacing:-.5px; }
    .splash-title span { color:#6e40c9; }
    .splash-sub { font-family:system-ui,sans-serif;font-size:13px;color:#8b949e; }
    .splash-spinner { width:24px;height:24px;border:2px solid rgba(110,64,201,.3);border-top-color:#6e40c9;border-radius:50%;animation:spin .7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
  <!-- Ace Editor — local files (put ace/ folder next to index.html) -->
  <!-- Ace Editor — loads local ace/ folder, falls back to CDN on HTTPS/production -->
  <script>
    (function() {
      var ACE_CDN = 'https://cdnjs.cloudflare.com/ajax/libs/ace/1.36.0/';

      function loadScript(src, onload, onerror) {
        var s = document.createElement('script');
        s.src = src;
        s.onload = onload || function(){};
        s.onerror = onerror || function(){};
        document.head.appendChild(s);
      }

      function loadAceFromCDN() {
        loadScript(ACE_CDN + 'ace.min.js', function() {
          loadScript(ACE_CDN + 'ext-language_tools.min.js');
          window._aceLoaded = true;
        });
      }

      // On HTTPS (Netlify/production) skip local and go straight to CDN
      if (location.protocol === 'https:') {
        loadAceFromCDN();
        return;
      }

      // On localhost: try local ace/ first, fall back to CDN
      loadScript('ace/ace.js',
        function() {
          loadScript('ace/ext-language_tools.js');
          window._aceLoaded = true;
        },
        function() { loadAceFromCDN(); }
      );
    })();
  </script>
  <!-- Emmet core for HTML/CSS abbreviation expansion -->
</head>
<body>
<!-- Offline loading splash — hidden after app boots -->
<div id="app-loading-splash">
  <div class="splash-logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
    </svg>
  </div>
  <div class="splash-title">Codex <span>Editor</span></div>
  <div class="splash-sub">Loading offline workspace…</div>
  <div class="splash-spinner"></div>
</div>
<div id="app">

  <div id="title-bar">
    <div class="traffic-lights"><div class="traffic-dot td-red"></div><div class="traffic-dot td-yellow"></div><div class="traffic-dot td-green"></div></div>
    <span id="app-title">CodeX</span>
    <div class="title-actions">
      <span id="save-indicator">Saved</span>
      <button id="btn-run"     class="title-btn" title="Run">
        <svg viewBox="0 0 24 24" fill="currentColor" style="color:#3fb950"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      </button>
      <button id="btn-stop" class="title-btn" title="Stop" style="display:none">
        <svg viewBox="0 0 24 24" fill="currentColor" style="color:#f48771"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
      </button>
      <!-- Clean/Focus mode toggle -->
      <button id="btn-clean-view" class="title-btn" title="Clean View — hide all panels (Ctrl+\)" data-active="false">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
        </svg>
      </button>
      <button id="btn-format"  class="title-btn" title="Format Document">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="21" y1="10" x2="7" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="21" y1="18" x2="7" y2="18"/></svg>
      </button>
      <button id="btn-find"    class="title-btn" title="Find (Ctrl+F)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
      <button id="btn-panel-toggle" class="title-btn" title="Toggle Bottom Panel">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="15" x2="21" y2="15"/></svg>
      </button>
      <button id="btn-console" class="title-btn" title="Toggle Console">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
      </button>
      <button id="btn-cmd"  class="title-btn" title="Command Palette (Ctrl+P)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M18 3a3 3 0 0 0-3 3v12a3 3 0 0 0 3 3 3 3 0 0 0 3-3 3 3 0 0 0-3-3H6a3 3 0 0 0-3 3 3 3 0 0 0 3 3 3 3 0 0 0 3-3V6a3 3 0 0 0-3-3 3 3 0 0 0-3 3 3 3 0 0 0 3 3h12a3 3 0 0 0 3-3 3 3 0 0 0-3-3z"/></svg>
      </button>
      <button id="btn-toggle-sidebar" class="title-btn" title="Toggle Sidebar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
      </button>
    </div>
  </div>

  <div id="main-body">
    <div id="activity-bar">
      <button class="activity-btn active" data-panel="explorer" title="Explorer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
      </button>
      <button class="activity-btn" data-panel="search" title="Search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
      <button class="activity-btn" data-panel="plugins" title="Extensions">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5z"/><line x1="16" y1="8" x2="2" y2="22"/><line x1="17.5" y1="15" x2="9" y2="15"/></svg>
      </button>
    </div>

    <div id="sidebar">
      <!-- Explorer -->
      <div id="panel-explorer" class="sidebar-panel">
        <div class="panel-header">Explorer
          <div class="panel-actions">
            <button id="btn-new-file"     class="icon-btn" title="New File">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
            </button>
            <button id="btn-new-folder"   class="icon-btn" title="New Folder">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
            </button>
            <button id="btn-open-file"    class="icon-btn" title="Open File">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            </button>
            <button id="btn-open-folder"  class="icon-btn" title="Open Folder">
              <svg viewBox="0 0 24 24" fill="none" stroke="#dcb67a" stroke-width="1.5" stroke-linecap="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><path d="M2 10h20"/></svg>
            </button>
            <button id="btn-import-image" class="icon-btn" title="Import Image">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            </button>
            <button id="btn-import-zip" class="icon-btn" title="Import ZIP Project">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/><path d="M9 12h6"/></svg>
            </button>
          </div>
        </div>
        <div class="panel-content"><div id="file-list"></div></div>
      </div>

      <!-- Search -->
      <div id="panel-search" class="sidebar-panel hidden">
        <div class="panel-header">Search</div>
        <div class="search-box"><input id="search-input" type="text" placeholder="Search in files…" autocomplete="off" spellcheck="false"></div>
        <div class="panel-content"><div id="search-results"><p class="empty-hint">Type to search.</p></div></div>
      </div>

      <!-- Plugins / Extensions -->
      <div id="panel-plugins" class="sidebar-panel hidden" style="position:relative">
        <div id="plugin-detail" class="hidden">
          <div class="pd-header">
            <button class="pd-back" id="pd-back-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            </button>
            <span class="pd-title-text">Extension</span>
          </div>
          <div class="pd-body" id="pd-body" style="flex:1;overflow-y:auto;padding:14px"></div>
        </div>
        <div class="panel-header">Extensions
          <div class="panel-actions">
            <button id="btn-upload-plugin" class="icon-btn" title="Upload Plugin">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            </button>
            <button id="btn-new-plugin" class="icon-btn" title="Create Plugin">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
          </div>
        </div>
        <div class="plugin-search-box"><input id="plugin-search" type="text" placeholder="Search extensions…" autocomplete="off"></div>
        <div class="panel-content" id="plugins-scroll-body"></div>
      </div>
    </div>

    <div id="editor-area">
      <div id="tab-bar"></div>
      <div id="find-replace-bar" class="hidden">
        <div class="fr-row">
          <button class="fr-icon-btn" id="fr-btn-toggle-replace" title="Toggle Replace">±</button>
          <input class="fr-input" id="fr-find-input" type="text" placeholder="Find…" autocomplete="off" spellcheck="false">
          <span id="fr-match-info"></span>
          <button class="fr-btn" id="fr-btn-prev">↑</button>
          <button class="fr-btn" id="fr-btn-next">↓</button>
          <div class="fr-cb-group">
            <label><input type="checkbox" id="fr-cb-case"> Aa</label>
            <label><input type="checkbox" id="fr-cb-word"> \b</label>
            <label><input type="checkbox" id="fr-cb-regex"> .*</label>
          </div>
          <button class="fr-icon-btn" id="fr-btn-close">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="fr-replace-row fr-row">
          <span style="width:22px"></span>
          <input class="fr-input" id="fr-replace-input" type="text" placeholder="Replace…" autocomplete="off" spellcheck="false">
          <button class="fr-btn" id="fr-btn-replace">Replace</button>
          <button class="fr-btn" id="fr-btn-replace-all">All</button>
        </div>
      </div>
      <div id="workspace">
        <div id="editor-panel"><div id="ace-editor"></div></div>
        <div id="preview-panel" class="hidden">
          <div id="preview-toolbar">
            <span id="preview-url">Preview</span>
            <button class="preview-btn" id="btn-refresh">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
            </button>
            <button class="preview-btn" id="btn-close-preview">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>
          <div id="preview-resolution-bar">
            <button class="res-btn active" data-w="100%" data-h="100%">Full</button>
            <button class="res-btn" data-w="1280px" data-h="800px">Laptop</button>
            <button class="res-btn" data-w="1440px" data-h="900px">MacBook</button>
            <button class="res-btn" data-w="360px"  data-h="780px">Samsung</button>
            <button class="res-btn" data-w="390px"  data-h="844px">iPhone 14</button>
            <button class="res-btn" data-w="430px"  data-h="932px">iPhone Max</button>
            <button class="res-btn" data-w="800px"  data-h="600px">800×600</button>
          </div>
          <div id="preview-iframe-wrap" style="flex:1;overflow:auto;background:#666;display:flex;align-items:flex-start;justify-content:center;padding:0;">
            <iframe id="preview-iframe" sandbox="allow-scripts allow-same-origin allow-forms allow-modals" title="Preview" style="border:none;background:#fff;"></iframe>
          </div>
        </div>
      </div>
      <div id="panel-area" class="hidden">
        <div id="panel-resizer"></div>
        <div id="panel-bar"></div>
        <div id="panel-body"></div>
      </div>
      <div id="kbd-toolbar">
        <button id="btn-emmet" title="Expand Emmet abbreviation (Tab)">Emmet ⇥</button>
        <button class="kbd-key" data-insert="{">{</button>
        <button class="kbd-key" data-insert="}">}</button>
        <button class="kbd-key" data-insert="(">(</button>
        <button class="kbd-key" data-insert=")">)</button>
        <button class="kbd-key" data-insert="[">[</button>
        <button class="kbd-key" data-insert="]">]</button>
        <button class="kbd-key" data-insert=";">;</button>
        <button class="kbd-key" data-insert=":">:</button>
        <button class="kbd-key" data-insert="'">'</button>
        <button class="kbd-key" data-insert='"'>&quot;</button>
        <button class="kbd-key" data-insert="`">`</button>
        <button class="kbd-key" data-insert="=">=</button>
        <button class="kbd-key" data-insert="=>">=></button>
        <button class="kbd-key" data-insert=".">.</button>
        <button class="kbd-key" data-insert=",">,</button>
        <button class="kbd-key" data-insert="/">/</button>
        <button class="kbd-key" data-insert="&#9;">⇥</button>
      </div>
      <div id="status-bar">
        <span class="status-item" id="status-file">No file</span>
        <span class="status-sep">·</span>
        <span class="status-item" id="status-lang">JavaScript</span>
        <span class="status-sep">·</span>
        <span class="status-item" id="status-cursor">Ln 1, Col 1</span>
        <span class="status-sep">·</span>
        <span class="status-item" id="lint-status" style="cursor:pointer" title="Click to configure ESLint" onclick="if(typeof ESLintLinter!=='undefined')ESLintLinter.openConfig()"></span>
        <span class="status-plugin-anchor" style="margin-left:auto"></span>
        <span class="status-item status-eslint-toggle" id="status-eslint-btn" title="Toggle ESLint" style="cursor:pointer;opacity:.6" onclick="if(typeof ESLintLinter!=='undefined'){ESLintLinter.toggle();this.style.opacity=ESLintLinter.isEnabled()?'1':'.4';}">🔍</span>
      </div>
    </div>
  </div>
</div>

<!-- Command Palette -->
<div id="command-palette-overlay" class="hidden">
  <div id="command-palette-box">
    <input id="cp-input" type="text" placeholder="Search files or type a command…" autocomplete="off" spellcheck="false">
    <div id="cp-list"></div>
  </div>
</div>

<!-- Plugin Editor Overlay -->
<div id="plugin-editor-overlay" class="hidden">
  <div id="plugin-editor-header">
    <span id="plugin-editor-title">New Plugin</span>
    <div class="plugin-editor-actions">
      <button id="btn-plugin-editor-cancel"  class="btn-sm">Cancel</button>
      <button id="btn-plugin-editor-install" class="btn-sm btn-primary-sm">Install</button>
    </div>
  </div>
  <div class="plugin-editor-format-bar">
    <button class="pef-tab active" data-fmt="json">JSON</button>
    <button class="pef-tab"        data-fmt="js">JavaScript</button>
    <button class="pef-tab"        data-fmt="html">HTML Panel</button>
    <span id="plugin-editor-hint" class="pef-hint">JSON — config plugin</span>
  </div>
  <div id="plugin-editor-errors" class="hidden"></div>
  <div id="plugin-ace-editor"></div>
</div>

<div id="sidebar-backdrop" onclick="AppState.sidebarOpen=false;document.getElementById('sidebar').classList.add('collapsed');this.style.display='none';setTimeout(function(){if(Editor)Editor.resize();},220)"></div>

<!-- Mobile Top Bar (phone only) -->
<div id="mob-topbar">
  <button id="mob-hamburger" class="mob-topbar-btn" title="Menu">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
  <div class="mob-topbar-title"><span class="mob-title-codex">Codex</span> <span class="mob-title-editor">Editor</span></div>
  <button id="mob-more" class="mob-topbar-btn" title="More">
    <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>
  </button>
</div>

<!-- Hamburger Drawer -->
<div id="mob-drawer-overlay" class="hidden"></div>
<div id="mob-drawer" class="hidden">
  <div class="mob-drawer-header">
    <span class="mob-title-codex">Codex</span><span class="mob-title-editor"> Editor</span>
    <button id="mob-drawer-close" class="mob-topbar-btn">×</button>
  </div>
  <div class="mob-drawer-menu">
    <button class="mob-drawer-item" id="mdi-new-project"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>New Project</button>
    <button class="mob-drawer-item" id="mdi-open-project"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>Open Project</button>
    <button class="mob-drawer-item" id="mdi-save"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>Save</button>
    <div class="mob-drawer-sep"></div>

<script>
/* ═══════════════════════════════════════════════════════════
   SINGLE BOOT FUNCTION — do NOT add another one
   This is the only place where init() calls happen.
════════════════════════════════════════════════════════════ */
(function boot() {
  'use strict';

  // Safety net: if boot takes > 12s, hide splash and show error
  var _bootTimeout = setTimeout(function() {
    var splash = document.getElementById('app-loading-splash');
    if (splash) {
      splash.innerHTML =
        '<div style="text-align:center;padding:40px;font-family:system-ui">' +
        '<div style="font-size:32px;margin-bottom:12px">⚠️</div>' +
        '<div style="font-size:16px;font-weight:700;color:#fff;margin-bottom:8px">Failed to load</div>' +
        '<div style="font-size:13px;color:#8b949e;margin-bottom:20px">Ace Editor could not load. Check your internet connection.</div>' +
        '<button onclick="location.reload()" style="background:#6e40c9;color:#fff;border:none;padding:10px 24px;border-radius:8px;font-size:14px;cursor:pointer">Retry</button>' +
        '</div>';
    }
  }, 12000);

  // Wait for Ace to be available before booting
  function _waitForAce(cb) {
    var tries = 0;
    function check() {
      tries++;
      if (typeof ace !== 'undefined' && ace.edit) { cb(); return; }
      if (tries > 100) { cb(); return; } // give up after 10s, boot anyway
      setTimeout(check, 100);
    }
    check();
  }

  _waitForAce(function() {
    clearTimeout(_bootTimeout);
    _boot();
  });

  function _boot() {
  'use strict';

  // ── 1. Core state + editor ────────────────────────────────
  loadFromStorage();
  Editor.init();
  // Apply saved theme class to body immediately
  (function() {
    var savedTheme = AppState.editor.theme || 'monokai';
    document.body.classList.add('theme-' + savedTheme);
    document.body.setAttribute('data-theme', savedTheme);
    if (savedTheme === 'twilight' || savedTheme === 'tomorrow' || savedTheme === 'cobalt') {
      document.documentElement.style.setProperty('--accent', '#6e40c9');
      document.documentElement.style.setProperty('--accent-hover', '#7c52d6');
    }
  })();
  PanelSystem.init();
  UI.init();
  Runner.init();

  // ── 2. Feature modules ────────────────────────────────────
  FolderTree.init();
  FindReplace.init();
  CommandPalette.init();
  GitPanel.init();
  LangRunner.init();
  FileManager.init();
  FileManager.bindSave();
  SplitScreen.init();
  ExportZip.init();
  NotificationCenter.init();
  PipPanel.init();
  ThemeCreator.init();
  AIAssistant.init();
  SnippetSystem.init();
  FileDiff.init();
  ImageViewer.init();
  ImageImport.init();
  AutoFormatter.init();
  Changelog.init();
  Terminal.init();
  AISuggest.init();
  Templates.init();
  MarkdownPreview.init();
  ImgBG.init();
  // v12.7 new modules — each wrapped in try/catch so one failure can't break boot
  try { ProjectManager.init(); }   catch(e) { console.warn('[ProjectManager]', e); }
  try { GlobalSearch.init(); }     catch(e) { console.warn('[GlobalSearch]', e); }
  try { AICustomize.init(); }      catch(e) { console.warn('[AICustomize]', e); }
  try { ShadowPicker.init(); }     catch(e) { console.warn('[ShadowPicker]', e); }
  try { PathIntelligence.init();  } catch(e) { console.warn('[PathIntelligence]', e); }
  try { AIAgent.init();           } catch(e) { console.warn('[AIAgent]', e); }
  try { AIMemory.init();          } catch(e) { console.warn('[AIMemory]', e); }
  try { AIGhostText.init();       } catch(e) { console.warn('[AIGhostText]', e); }
  try { PythonRunner.init();      } catch(e) { console.warn('[PythonRunner]', e); }
  try { ScreenshotToCode.init();  } catch(e) { console.warn('[ScreenshotToCode]', e); }
  try { WorkspaceSync.init();     } catch(e) { console.warn('[WorkspaceSync]', e); }
  try { ESLintLinter.init();       } catch(e) { console.warn('[ESLintLinter]', e); }
  try { Performance.init();        } catch(e) { console.warn('[Performance]', e); }
  try { ErrorIntelligence.init();  } catch(e) { console.warn('[ErrorIntelligence]', e); }
  try { CSSToolsPanel.init();      } catch(e) { console.warn('[CSSToolsPanel]', e); }
  try { VoiceInput.init(); }       catch(e) { console.warn('[VoiceInput]', e); }
  try { GitHubIntegration.init();}  catch(e) { console.warn('[GitHub]', e); }
  try { CodeAnalytics.init(); }    catch(e) { console.warn('[Analytics]', e); }
  try { Keybindings.init(); }      catch(e) { console.warn('[Keybindings]', e); }
  try { PowerMode.init(); }        catch(e) { console.warn('[PowerMode]', e); }
  try { AICodeReview.init(); }     catch(e) { console.warn('[AIReview]', e); }
  try { Collaboration.init(); }    catch(e) { console.warn('[Collab]', e); }
  try { ThemeMarketplace.init(); } catch(e) { console.warn('[ThemeMarket]', e); }

  // ── Mobile UI v12.11 ─────────────────────────────────────
  (function() {
    var MOB_FEATURES_KEY = 'codex:mob-features';
    var mobFeatures = { ai: false, output: false, git: false, analytics: false };
    try { var sf = JSON.parse(localStorage.getItem(MOB_FEATURES_KEY)||'{}'); Object.assign(mobFeatures, sf); } catch(e) {}

    function _saveMobFeatures() { try { localStorage.setItem(MOB_FEATURES_KEY, JSON.stringify(mobFeatures)); } catch(e) {} }

    // Elements
    var nav       = document.getElementById('mob-nav');
    var topbar    = document.getElementById('mob-topbar');
    var backdrop  = document.getElementById('sidebar-backdrop');
    var drawer    = document.getElementById('mob-drawer');
    var drawerOv  = document.getElementById('mob-drawer-overlay');

    // Nav buttons
    var btnFiles    = document.getElementById('mob-btn-files');
    var btnCode     = document.getElementById('mob-btn-code');
    var btnRun      = document.getElementById('mob-btn-run');
    var btnAI       = document.getElementById('mob-btn-ai');
    var btnSettings = document.getElementById('mob-btn-settings');

    // Apply AI tab visibility based on feature toggle
    function _applyAiTab() {
      if (btnAI) btnAI.classList.toggle('hidden', !mobFeatures.ai);
    }
    _applyAiTab();

    // Active state helper
    function _setActive(btn) {
      document.querySelectorAll('.mob-nav-btn').forEach(function(b){ b.classList.remove('active'); });
      if (btn) btn.classList.add('active');
    }

    // Panel show helper — collapses sidebar, shows correct view
    function _showView(view) {
      var sidebar = document.getElementById('sidebar');
      var editorArea = document.getElementById('editor-area') || document.getElementById('ace-editor');
      var panelArea  = document.getElementById('panel-area');

      // Hide sidebar backdrop
      if (backdrop) backdrop.style.display = 'none';

      if (view === 'files') {
        // Show sidebar with file tree
        AppState.sidebarOpen = true;
        if (sidebar) sidebar.classList.remove('collapsed');
        if (backdrop) backdrop.style.display = 'block';
        UI.switchSidebarPanel('explorer');
      } else if (view === 'code') {
        // Full-screen editor
        AppState.sidebarOpen = false;
        if (sidebar) sidebar.classList.add('collapsed');
        if (panelArea) panelArea.classList.add('hidden');
        if (Editor) setTimeout(function(){ Editor.resize(); }, 60);
      } else if (view === 'run') {
        // Run preview
        AppState.sidebarOpen = false;
        if (sidebar) sidebar.classList.add('collapsed');
        Runner.run();
      } else if (view === 'ai') {
        // Show AI panel full-screen on mobile
        AppState.sidebarOpen = false;
        if (sidebar) sidebar.classList.add('collapsed');
        if (panelArea) { panelArea.classList.remove('hidden'); panelArea.style.display='flex'; }
        PanelSystem.show('ai');
      } else if (view === 'settings') {
        // Show settings in sidebar
        AppState.sidebarOpen = true;
        if (sidebar) sidebar.classList.remove('collapsed');
        if (backdrop) backdrop.style.display = 'block';
        UI.switchSidebarPanel('plugins');
      }
      saveToStorage();
    }

    // Nav tab bindings
    if (btnFiles)    btnFiles.addEventListener('click',    function(){ _setActive(btnFiles);    _showView('files'); });
    if (btnCode)     btnCode.addEventListener('click',     function(){ _setActive(btnCode);     _showView('code'); });
    if (btnRun)      btnRun.addEventListener('click',      function(){ _setActive(btnRun);      _showView('run'); });
    if (btnAI)       btnAI.addEventListener('click',       function(){ _setActive(btnAI);       _showView('ai'); });
    if (btnSettings) btnSettings.addEventListener('click', function(){ _setActive(btnSettings); _showView('settings'); });

    // Hamburger drawer
    var hamburger = document.getElementById('mob-hamburger');
    var drawerClose = document.getElementById('mob-drawer-close');
    function _openDrawer()  { if(drawer)drawer.classList.remove('hidden'); if(drawerOv)drawerOv.classList.remove('hidden'); }
    function _closeDrawer() { if(drawer)drawer.classList.add('hidden');    if(drawerOv)drawerOv.classList.add('hidden'); }
    if (hamburger)   hamburger.addEventListener('click', _openDrawer);
    if (drawerClose) drawerClose.addEventListener('click', _closeDrawer);
    if (drawerOv)    drawerOv.addEventListener('click', _closeDrawer);

    // Drawer items
    var dNew  = document.getElementById('mdi-new-project');
    var dOpen = document.getElementById('mdi-open-project');
    var dSave = document.getElementById('mdi-save');
    var dSet  = document.getElementById('mdi-settings');
    var dTheme= document.getElementById('mdi-themes');
    var dAbout= document.getElementById('mdi-about');
    if (dNew)   dNew.addEventListener('click',   function(){ _closeDrawer(); if(typeof Templates!=='undefined') Templates.openDialog(); });
    if (dOpen)  dOpen.addEventListener('click',  function(){ _closeDrawer(); if(typeof ExportZip!=='undefined') ExportZip.importZip(); });
    if (dSave)  dSave.addEventListener('click',  function(){ _closeDrawer(); if(typeof FileManager!=='undefined') FileManager.saveActive(); if(UI) UI.toast('Saved','success'); });
    if (dSet)   dSet.addEventListener('click',   function(){ _closeDrawer(); _setActive(btnSettings); _showView('settings'); });
    if (dTheme) dTheme.addEventListener('click', function(){ _closeDrawer(); PanelSystem.show('theme-market'); });
    if (dAbout) dAbout.addEventListener('click', function(){ _closeDrawer(); if(typeof Changelog!=='undefined') Changelog.open(); });

    // Show/hide for mobile vs desktop
    function _checkMob() {
      var isMob = window.innerWidth <= 768;
      if (nav)    nav.style.display    = isMob ? 'flex'  : 'none';
      if (topbar) topbar.style.display = isMob ? 'flex'  : 'none';
      // On desktop: remove topbar padding from main area
      var mainArea = document.getElementById('main-area') || document.querySelector('.main-area');
      if (mainArea) mainArea.style.paddingTop = isMob ? '' : '';
    }
    _checkMob();
    window.addEventListener('resize', _checkMob);

    // Expose feature toggle so settings panel can call it
    window._mobToggleFeature = function(feat, val) {
      mobFeatures[feat] = val;
      _saveMobFeatures();
      if (feat === 'ai') _applyAiTab();
    };
    window._getMobFeatures = function() { return mobFeatures; };

    // Default: Code tab active on mobile start
    if (window.innerWidth <= 768) {
      _setActive(btnCode);
    }
  })();


  // ── 3. Load active file ───────────────────────────────────
  var file = getActiveFile();
  if (file) Editor.loadFile(file);
  PluginManager.applyAll();

  // ── 4. Tab manager (needs Ace to be ready) ────────────────
  TabManager.init();

  // ── 5. Panel resize + drag (after layout renders) ─────────
  setTimeout(function() {
    PanelResizer.init();
    PanelDragger.init();
  }, 200);

  // ── 6. PWA ────────────────────────────────────────────────
  PWA.init();

  // ── 7. Render file tree ───────────────────────────────────
  FolderTree.render(document.getElementById('file-list'));

  // ── 8. Button bindings ───────────────────────────────────
  function $b(id, fn) { var el = document.getElementById(id); if (el) el.addEventListener('click', fn); }

  $b('btn-format',         function() { Formatter.formatActive(); });
  $b('btn-find',           function() { FindReplace.open('find'); });
  $b('btn-cmd',            function() { CommandPalette.open(); });
  $b('btn-close-preview',  function() { Runner.close(); });
  $b('btn-import-image', function() { if (ImageImport) ImageImport.openPicker(); });
  $b('btn-import-zip',   function() { if (ExportZip)   ExportZip.importZip(); });
  $b('btn-new-folder',   function() { FolderTree.promptNewFolder(); });
  $b('btn-open-folder',  function() { FileManager.openFolder(); });
  $b('btn-refresh',      function() { Runner.run(); });
  $b('pd-back-btn',        function() { document.getElementById('plugin-detail').classList.add('hidden'); });

  // ── Clean View Toggle (focus mode) ──────────────────────────────────
  var _cleanViewActive = false;
  $b('btn-clean-view', function() {
    _cleanViewActive = !_cleanViewActive;
    var btn       = document.getElementById('btn-clean-view');
    var sidebar   = document.getElementById('sidebar');
    var panelArea = document.getElementById('panel-area');
    var actBar    = document.getElementById('activity-bar');
    var backdrop  = document.getElementById('sidebar-backdrop');
    var statusBar = document.getElementById('status-bar');
    var tabBar    = document.getElementById('tab-bar');
    var topbar    = document.getElementById('topbar');

    if (_cleanViewActive) {
      // CLEAN VIEW: only show editor + Run button
      document.body.classList.add('clean-view');
      if (sidebar)   sidebar.classList.add('collapsed');
      if (panelArea) panelArea.classList.add('hidden');
      if (backdrop)  backdrop.style.display = 'none';
      if (btn) { btn.classList.add('active'); btn.title = 'Exit Clean View'; }
      // Show only Run button in topbar — hide everything else
      document.querySelectorAll('.title-btn').forEach(function(b) {
        if (b.id !== 'btn-run' && b.id !== 'btn-stop' && b.id !== 'btn-clean-view') {
          b.style.display = 'none';
        }
      });
      if (statusBar) statusBar.style.display = 'none';
      if (tabBar)    tabBar.style.display    = 'none';
      if (actBar)    actBar.style.display    = 'none';
      if (UI)        UI.toast('Clean View ON — Tab to exit', 'info');
    } else {
      // RESTORE
      document.body.classList.remove('clean-view');
      if (sidebar)   sidebar.classList.toggle('collapsed', !AppState.sidebarOpen);
      if (btn)  { btn.classList.remove('active'); btn.title = 'Clean View'; }
      document.querySelectorAll('.title-btn').forEach(function(b) { b.style.display = ''; });
      if (statusBar) statusBar.style.display = '';
      if (tabBar)    tabBar.style.display    = '';
      if (actBar)    actBar.style.display    = '';
    }
    setTimeout(function() { if (Editor && Editor.resize) Editor.resize(); }, 60);
  });

  // Ctrl+\ shortcut to toggle clean view
  window.addEventListener('keydown', function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === '\\') {
      e.preventDefault();
      document.getElementById('btn-clean-view') && document.getElementById('btn-clean-view').click();
    }
  });

  // Sidebar toggle
  $b('btn-toggle-sidebar', function() {
    AppState.sidebarOpen = !AppState.sidebarOpen;
    var sb = document.getElementById('sidebar');
    if (sb) sb.classList.toggle('collapsed', !AppState.sidebarOpen);
    document.querySelectorAll('.activity-btn').forEach(function(b) {
      b.classList.toggle('active', b.dataset.panel === AppState.activePanel && AppState.sidebarOpen);
    });
    saveToStorage();
    setTimeout(function() { if (Editor && Editor.resize) Editor.resize(); }, 220);
  });

  // Bottom panel toggle
  $b('btn-panel-toggle', function() {
    var panelArea = document.getElementById('panel-area');
    var isHidden  = panelArea && panelArea.classList.contains('hidden');
    if (isHidden) {
      var active = PanelSystem.getActive();
      PanelSystem.show(active || PanelSystem.BUILTIN.OUTPUT);
    } else {
      PanelSystem.toggleById(PanelSystem.getActive() || PanelSystem.BUILTIN.OUTPUT);
    }
    var btn = document.getElementById('btn-panel-toggle');
    if (btn && panelArea) btn.classList.toggle('active', !panelArea.classList.contains('hidden'));
  });

  // Console (Eruda) toggle
  $b('btn-console', function() {
    if (typeof eruda !== 'undefined') {
      eruda._isInit ? eruda.hide() : eruda.init();
    } else {
      // Load eruda on first click
      var s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/eruda';
      s.onload = function() { eruda.init(); };
      document.head.appendChild(s);
    }
    var btn = document.getElementById('btn-console');
    if (btn) btn.classList.toggle('active');
  });

  // Keyboard shortcut: Ctrl+P = command palette
  window.addEventListener('keydown', function(e) {
    var ctrl = e.ctrlKey || e.metaKey;
    if (ctrl && e.key === 'p') { e.preventDefault(); CommandPalette.open(); }
    if (ctrl && e.shiftKey && e.key === 'E') { e.preventDefault(); ExportZip.exportZip(); }
  });

  // Preview resolution buttons
  document.querySelectorAll('.res-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.res-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      var iframe = document.getElementById('preview-iframe');
      var wrap   = document.getElementById('preview-iframe-wrap');
      if (!iframe) return;
      var w = btn.dataset.w, h = btn.dataset.h;
      if (w === '100%') {
        iframe.style.width = '100%'; iframe.style.height = '100%';
        if (wrap) { wrap.style.padding = '0'; wrap.style.alignItems = 'stretch'; }
      } else {
        iframe.style.width = w; iframe.style.height = h;
        if (wrap) { wrap.style.padding = '8px'; wrap.style.alignItems = 'flex-start'; }
      }
    });
  });
  // Default full size
  (function() { var i = document.getElementById('preview-iframe'); if (i) { i.style.width='100%'; i.style.height='100%'; } })();

  // Mobile keyboard
  document.querySelectorAll('.kbd-key').forEach(function(btn) {
    btn.addEventListener('click', function() {
      if (!Editor || !Editor._ace) return;
      Editor._ace.insert(btn.dataset.insert === '\t' ? '    ' : btn.dataset.insert);
      Editor._ace.focus();
    });
  });

  // Emmet expand button
  var emmetBtn = document.getElementById('btn-emmet');
  if (emmetBtn) emmetBtn.addEventListener('click', function() {
    if (Editor) {
      var expanded = Editor.expandEmmet();
      if (!expanded && Editor._ace) Editor._ace.insert('\t');
      Editor._ace && Editor._ace.focus();
    }
  });

  // Re-render folder tree on file events
  [Events.FILE_CREATED, Events.FILE_DELETED, Events.FILE_RENAMED, Events.FILE_SWITCHED].forEach(function(ev) {
    EventBus.on(ev, function() { FolderTree.render(document.getElementById('file-list')); });
  });

  // Register extra command palette entries
  CommandPalette.register({
    id:'export-zip', label:'File: Export Project as ZIP (Ctrl+Shift+E)', category:'File',
    icon: Icons.getUI('zip') || '<svg viewBox="0 0 24 24" fill="none" stroke="#3fb950" stroke-width="1.5" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>',
    action: function() { ExportZip.exportZip(); },
  });
  CommandPalette.register({
    id:'import-zip', label:'File: Import ZIP Project', category:'File',
    icon: Icons.getUI('upload'),
    action: function() { ExportZip.importZip(); },
  });
  CommandPalette.register({
    id:'new-project-tpl', label:'Project: New Project from Template', category:'File',
    icon: Icons.getUI('newFile'),
    action: function() { Templates.openDialog(); },
  });
  CommandPalette.register({
    id:'imgbg-open', label:'Theme: Set Image Background', category:'Theme',
    icon: Icons.getUI('image'),
    action: function() { ImgBG.openPicker(); },
  });
  CommandPalette.register({
    id:'imgbg-clear', label:'Theme: Remove Image Background', category:'Theme',
    icon: Icons.getUI('trash'),
    action: function() { ImgBG.clear(); },
  });
  CommandPalette.register({
    id:'markdown-preview', label:"View: Markdown Preview", category:'View',
    icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>',
    action: function() { PanelSystem.show('markdown'); },
  });
  CommandPalette.register({
    id:'terminal-open', label:'View: Open Terminal', category:'View',
    icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>',
    action: function() { PanelSystem.show('terminal'); },
  });
  CommandPalette.register({
    id:'changelog-open', label:"What's New / Changelog", category:'View',
    icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>',
    action: function() { PanelSystem.show('changelog'); },
  });
  CommandPalette.register({
    id:'emmet-expand', label:'Emmet: Expand Abbreviation', category:'Edit',
    icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>',
    action: function() { if (Editor) Editor.expandEmmet(); },
  });
  CommandPalette.register({
    id:'ai-search-web', label:'AI: Search the Web', category:'AI',
    icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>',
    action: function() {
      PanelSystem.show('ai');
      setTimeout(function() {
        var q = prompt('What do you want to search for?');
        if (q && typeof AIAssistant !== 'undefined') AIAssistant._sendMsg('Search the web for: ' + q + '. Provide accurate and current information.');
      }, 300);
    },
  });
  CommandPalette.register({
    id:'ai-create-changelog', label:'AI: Create Changelog Entry', category:'AI',
    icon: Icons.getUI('ai') || '',
    action: function() {
      PanelSystem.show('ai');
      setTimeout(function() {
        AIAssistant._sendMsg('Create a changelog entry for the latest changes in this project. Format it as: version, date (today), type (major/minor/patch), title, and bullet-point changes list.');
      }, 300);
    },
  });

  // Power Mode combo display element
  (function() {
    var el = document.createElement('div');
    el.id  = 'power-combo';
    el.style.cssText = 'position:fixed;top:60px;right:16px;font-size:22px;font-weight:900;color:#ff8c00;text-shadow:0 0 20px currentColor;opacity:0;transition:opacity .3s;pointer-events:none;z-index:9995;font-family:var(--font-ui)';
    document.body.appendChild(el);
  })();

  // Register v12.7 module commands
  try {
    CommandPalette.register({ id:'pm-open2',      label:'Projects: Open Project Manager',       category:'File',   action:function(){ PanelSystem.show('projects'); } });
    CommandPalette.register({ id:'gs-open2',      label:'Search: Global Search',                category:'Search', action:function(){ PanelSystem.show('global-search'); } });
    CommandPalette.register({ id:'gh-open2',      label:'GitHub: Open GitHub Panel',            category:'Git',    action:function(){ PanelSystem.show('github'); } });
    CommandPalette.register({ id:'analytics2',    label:'Analytics: View Code Analytics',       category:'View',   action:function(){ PanelSystem.show('analytics'); } });
    CommandPalette.register({ id:'kb-open2',      label:'Keybindings: Open Editor',             category:'View',   action:function(){ PanelSystem.show('keybindings'); } });
    CommandPalette.register({ id:'collab-open',   label:'Collab: Open Collaboration Panel',     category:'View',   action:function(){ PanelSystem.show('collab'); } });
    CommandPalette.register({ id:'theme-open2',   label:'Themes: Browse Marketplace',           category:'Theme',  action:function(){ PanelSystem.show('theme-market'); } });
    CommandPalette.register({ id:'power-toggle',  label:'Power Mode: Toggle 🔥',                category:'View',   action:function(){ if(typeof PowerMode!=='undefined') PowerMode.toggle(); } });
    CommandPalette.register({ id:'ai-review2',    label:'AI: Review Entire Project',            category:'AI',     action:function(){ if(typeof AICodeReview!=='undefined') AICodeReview.startReview(); } });
    CommandPalette.register({ id:'voice-toggle',  label:'AI: Toggle Voice Input',               category:'AI',     action:function(){ if(typeof VoiceInput!=='undefined') VoiceInput.toggle(); } });
    CommandPalette.register({ id:'export-zip3',   label:'File: Export Project as ZIP',          category:'File',   action:function(){ if(ExportZip) ExportZip.exportZip(); } });
    CommandPalette.register({ id:'import-zip3',   label:'File: Import ZIP Project',             category:'File',   action:function(){ if(ExportZip) ExportZip.importZip(); } });
    CommandPalette.register({ id:'imgbg-set2',    label:'Theme: Set Image Background',          category:'Theme',  action:function(){ if(typeof ImgBG!=='undefined') ImgBG.openPicker(); } });
    CommandPalette.register({ id:'new-tpl2',      label:'Project: New from Template',           category:'File',   action:function(){ if(typeof Templates!=='undefined') Templates.openDialog(); } });
    // v12.12
    CommandPalette.register({ id:'agent-open2',   label:'Agent: Open AI Agent Mode',            category:'AI',     action:function(){ PanelSystem.show('agent'); } });
    CommandPalette.register({ id:'python-run2',   label:'Python: Run Current .py File',         category:'Run',    action:function(){ if(typeof PythonRunner!=='undefined') PythonRunner.runActiveFile(); } });
    CommandPalette.register({ id:'python-open2',  label:'Python: Open Python Runner',           category:'Run',    action:function(){ PanelSystem.show('python'); } });
    CommandPalette.register({ id:'s2c-open',      label:'AI: Screenshot to Code',               category:'AI',     action:function(){ PanelSystem.show('screenshot'); } });
    CommandPalette.register({ id:'drive-open2',   label:'Drive: Sync Panel',                    category:'File',   action:function(){ PanelSystem.show('drive-sync'); } });
    CommandPalette.register({ id:'drive-push2',   label:'Drive: Push to Google Drive',          category:'File',   action:function(){ if(typeof WorkspaceSync!=='undefined') WorkspaceSync.syncProject(); } });
    CommandPalette.register({ id:'memory-open',   label:'AI: View Memory',                      category:'AI',     action:function(){ if(typeof AIMemory!=='undefined') AIMemory.openMemoryPanel(); } });
    CommandPalette.register({ id:'ghost-toggle2', label:'AI: Toggle Ghost Text',                category:'AI',     action:function(){ if(typeof AIGhostText!=='undefined') AIGhostText.toggle(); } });
    CommandPalette.register({ id:'hot-reload2',   label:'Run: Toggle Hot Reload',               category:'Run',    action:function(){ if(typeof Runner!=='undefined'&&Runner.toggleHotReload) Runner.toggleHotReload(); } });
    CommandPalette.register({ id:'eslint-toggle2',label:'ESLint: Toggle Real-time Linting',     category:'Code',   action:function(){ if(typeof ESLintLinter!=='undefined') ESLintLinter.toggle(); } });
    CommandPalette.register({ id:'eslint-fix2',   label:'ESLint: Fix Current File',             category:'Code',   action:function(){ if(typeof ESLintLinter!=='undefined') ESLintLinter.fixFile(); } });
    CommandPalette.register({ id:'eslint-cfg2',   label:'ESLint: Configure Rules',              category:'Code',   action:function(){ if(typeof ESLintLinter!=='undefined') ESLintLinter.openConfig(); } });
    CommandPalette.register({ id:'pwa-clear',     label:'PWA: Clear Cache & Refresh',           category:'App',    action:function(){ if(typeof PWA!=='undefined') PWA.clearCache(); } });
  } catch(e) { console.warn('[CP v12.7]', e); }

  // Emit ready
  EventBus.emit(Events.APP_READY, { file: file });

  // ── Auto-install from Marketplace (codexPluginEditor.com) ────────────
  (function() {
    var params = new URLSearchParams(window.location.search);
    var raw    = params.get('installPlugin');
    if (!raw) return;
    try {
      var plugin = JSON.parse(decodeURIComponent(raw));
      if (!plugin || !plugin.id || !plugin.code) return;
      setTimeout(function() {
        if (typeof PluginManager !== 'undefined') {
          PluginManager.installObject(plugin);
          PanelSystem.show('plugins');
          if (UI) UI.toast('✅ ' + plugin.title + ' installed from Marketplace!', 'success');
        }
        // Clean URL so refresh doesn't reinstall
        window.history.replaceState({}, '', window.location.pathname);
      }, 1200);
    } catch(e) { console.warn('[Marketplace install]', e); }
  })();

  // Hide loading splash
  var splash = document.getElementById('app-loading-splash');
  if (splash) {
    splash.classList.add('fade-out');
    setTimeout(function() { splash.remove(); }, 350);
  }
  console.log('[CodeX v12.14] Ready. Files:', AppState.files.length, '| Modules: all loaded');
  } // end _boot
})();
</script>
